<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CryptoVision - 加密货币与美股实时追踪</title>
  <link rel="preconnect" href="https://cdn.bootcdn.net">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.min.css">
  <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #030014;
      --bg-secondary: #0a0a1a;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.06);
      --accent-cyan: #00f0ff;
      --accent-purple: #a855f7;
      --accent-emerald: #10b981;
      --accent-rose: #f43f5e;
      --accent-orange: #f97316;
      --accent-yellow: #eab308;
      --accent-pink: #ec4899;
      --text-primary: #ffffff;
      --text-secondary: #64748b;
      --border-color: rgba(255, 255, 255, 0.08);
      --glow-cyan: 0 0 30px rgba(0, 240, 255, 0.3);
      --glow-purple: 0 0 30px rgba(168, 85, 247, 0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(168, 85, 247, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 80% 50%, rgba(0, 240, 255, 0.08), transparent),
        radial-gradient(ellipse 50% 30% at 20% 80%, rgba(0, 240, 255, 0.05), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--glow-cyan);
    }

    .logo-icon svg {
      width: 24px;
      height: 24px;
      fill: white;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Asset Selector */
    .asset-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .asset-btn {
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .asset-btn:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .asset-btn.active {
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(168, 85, 247, 0.2));
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .asset-btn .asset-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
    }

    .asset-btn[data-asset="ETH"] .asset-icon { background: linear-gradient(135deg, #627eea, #8b7cf6); }
    .asset-btn[data-asset="BTC"] .asset-icon { background: linear-gradient(135deg, #f7931a, #ffb347); }
    .asset-btn[data-asset="BNB"] .asset-icon { background: linear-gradient(135deg, #f3ba2f, #f9d65c); }
    .asset-btn[data-asset="OKB"] .asset-icon { background: linear-gradient(135deg, #2f80ed, #56ccf2); }
    .asset-btn[data-asset="SOL"] .asset-icon { background: linear-gradient(135deg, #00ffa3, #dc1fff); }
    .asset-btn[data-asset="TSLA"] .asset-icon { background: linear-gradient(135deg, #e82127, #ff6b6b); }
    .asset-btn[data-asset="SPXC"] .asset-icon { background: linear-gradient(135deg, #1e3a5f, #4a90d9); }
    .asset-btn[data-asset="MU"] .asset-icon { background: linear-gradient(135deg, #ed1c24, #f15a29); }

    .refresh-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .refresh-toggle:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-cyan);
    }

    .refresh-toggle.active {
      color: var(--accent-cyan);
      border-color: var(--accent-cyan);
    }

    .refresh-toggle.connected {
      color: var(--accent-emerald);
      border-color: var(--accent-emerald);
    }

    .refresh-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      transition: all 0.3s ease;
    }

    .refresh-toggle.active .refresh-dot {
      background: var(--accent-emerald);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .hero {
      text-align: center;
      margin-bottom: 40px;
    }

    .asset-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }

    .asset-icon-large {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }

    .price-display {
      position: relative;
      margin-bottom: 16px;
    }

    .current-price {
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: clamp(48px, 10vw, 80px);
      font-weight: 700;
      letter-spacing: -2px;
      background: linear-gradient(180deg, #ffffff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: priceReveal 1s ease-out;
    }

    @keyframes priceReveal {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .price-live {
      position: absolute;
      top: 10px;
      right: -60px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-emerald);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--accent-emerald);
      border-radius: 50%;
      animation: livePulse 2s infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
    }

    .price-change {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 18px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .price-change.positive {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-emerald);
    }

    .price-change.negative {
      background: rgba(244, 63, 94, 0.1);
      color: var(--accent-rose);
    }

    .predictions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .prediction-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(20px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .prediction-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .prediction-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-4px);
      border-color: rgba(0, 240, 255, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), var(--glow-cyan);
    }

    .prediction-card:hover::before {
      opacity: 1;
    }

    .prediction-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .prediction-value {
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .prediction-change {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 14px;
      font-weight: 600;
    }

    .prediction-change.positive {
      color: var(--accent-emerald);
    }

    .prediction-change.negative {
      color: var(--accent-rose);
    }

    .prediction-confidence {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
    }

    .confidence-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .confidence-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
      border-radius: 2px;
      transition: width 1s ease-out;
    }

    .chart-section {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 40px;
      backdrop-filter: blur(20px);
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .chart-title {
      font-size: 18px;
      font-weight: 600;
    }

    .timeframe-selector {
      display: flex;
      gap: 8px;
    }

    .timeframe-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .timeframe-btn:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .timeframe-btn.active {
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(168, 85, 247, 0.2));
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .chart-container {
      position: relative;
      height: 400px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(0, 240, 255, 0.2);
    }

    .stat-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .api-selector {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .api-selector:hover {
      border-color: rgba(0, 240, 255, 0.4);
    }

    .api-selector:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.2);
    }

    .api-selector option {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .trend-indicator {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .trend-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .trend-strength {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .trend-indicator.positive .trend-text { color: var(--accent-emerald); }
    .trend-indicator.negative .trend-text { color: var(--accent-rose); }
    .trend-indicator.neutral .trend-text { color: var(--text-secondary); }

    .levels-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .level-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .level-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
    }

    .level-card.support::after {
      background: var(--accent-emerald);
    }

    .level-card.resistance::after {
      background: var(--accent-rose);
    }

    .level-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .level-card.support .level-title {
      color: var(--accent-emerald);
    }

    .level-card.resistance .level-title {
      color: var(--accent-rose);
    }

    .level-price {
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .level-distance {
      font-size: 14px;
      color: var(--text-secondary);
    }

    footer {
      text-align: center;
      padding: 40px 0;
      color: var(--text-secondary);
      font-size: 14px;
    }

    footer p {
      margin: 0 0 8px;
    }

    footer .credit {
      font-size: 15px;
      color: var(--accent-cyan);
      font-weight: 500;
      margin-top: 8px;
    }

    footer a {
      color: var(--accent-cyan);
      text-decoration: none;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      text-align: center;
      padding: 40px;
      color: var(--accent-rose);
    }

    .status-bar {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      backdrop-filter: blur(10px);
      z-index: 100;
      transition: all 0.3s ease;
      opacity: 0.7;
    }

    .status-bar:hover {
      opacity: 1;
    }

    .status-bar.connected {
      color: var(--accent-emerald);
      border-color: rgba(16, 185, 129, 0.3);
    }

    .status-bar .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }

    .category-label {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 4px;
    }

    .category-label.crypto {
      background: rgba(0, 240, 255, 0.1);
      color: var(--accent-cyan);
    }

    .category-label.stock {
      background: rgba(168, 85, 247, 0.1);
      color: var(--accent-purple);
    }

    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }

      header {
        margin-bottom: 24px;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .asset-selector {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 8px;
        flex-wrap: nowrap;
      }

      .asset-btn {
        padding: 6px 12px;
        font-size: 12px;
        white-space: nowrap;
      }

      .price-display {
        flex-direction: column;
        align-items: flex-start;
      }

      .price-main {
        font-size: 32px;
      }

      .price-live {
        position: static;
        margin-top: 12px;
      }

      .chart-container {
        height: 250px;
      }

      .timeframe-selector {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 8px;
      }

      .timeframe-btn {
        padding: 8px 12px;
        font-size: 12px;
      }

      .predictions {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .prediction-card {
        padding: 16px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .stat-card {
        padding: 12px 16px;
      }

      .levels-grid {
        grid-template-columns: 1fr;
      }

      footer {
        padding: 24px 0;
        font-size: 12px;
      }

      .status-bar {
        bottom: 12px;
        right: 12px;
        left: 12px;
        text-align: center;
        font-size: 11px;
      }

      .api-selector {
        width: 100%;
        font-size: 13px;
        padding: 6px 10px;
      }
    }

    @media (max-width: 380px) {
      .logo-text {
        font-size: 18px;
      }

      .price-main {
        font-size: 28px;
      }

      .timeframe-btn {
        padding: 6px 10px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1.75l6.75 4.25v7.5L12 17.75l-6.75-4.25v-7.5L12 1.75zM12 18.5l6.75-4.25v-7.5L12 2.5l-6.75 4.25v7.5L12 18.5z"/>
          </svg>
        </div>
        <span class="logo-text">CryptoVision</span>
      </div>
      <div class="header-actions">
        <div class="asset-selector" id="assetSelector">
          <!-- Asset buttons will be generated by JS -->
        </div>
        <button class="refresh-toggle active" id="autoRefresh">
          <span class="refresh-dot"></span>
          <span>实时</span>
        </button>
      </div>
    </header>

    <section class="hero">
      <div class="asset-label" id="assetLabel">
        <div class="asset-icon-large" id="assetIconLarge"></div>
        <span id="assetName">Ethereum 以太坊</span>
        <span class="category-label crypto" id="assetCategory">加密货币</span>
      </div>
      <div class="price-display">
        <h1 class="current-price" id="currentPrice">加载中...</h1>
        <div class="price-live">
          <span class="live-dot"></span>
          <span>实时</span>
        </div>
      </div>
      <div class="price-change positive" id="priceChange">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 15l-6-6-6 6"/>

  <div class="status-bar" id="statusBar">
    状态: 连接中...
  </div>

  <script>
    // Asset configurations
    const ASSETS = {
      ETH: {
        name: 'Ethereum',
        nameCn: '以太坊',
        symbol: 'ETH',
        category: 'crypto',
        color: '#627eea',
        binanceSymbol: 'ETHUSDT',
        yahooSymbol: 'ETH-USD',
        decimals: 2
      },
      BTC: {
        name: 'Bitcoin',
        nameCn: '比特币',
        symbol: 'BTC',
        category: 'crypto',
        color: '#f7931a',
        binanceSymbol: 'BTCUSDT',
        yahooSymbol: 'BTC-USD',
        decimals: 2
      },
      BNB: {
        name: 'BNB',
        nameCn: '币安币',
        symbol: 'BNB',
        category: 'crypto',
        color: '#f3ba2f',
        binanceSymbol: 'BNBUSDT',
        yahooSymbol: 'BNB-USD',
        decimals: 2
      },
      OKB: {
        name: 'OKB',
        nameCn: 'OKX平台币',
        symbol: 'OKB',
        category: 'crypto',
        color: '#2f80ed',
        binanceSymbol: 'OKBUSDT',
        yahooSymbol: 'OKB-USD',
        decimals: 2
      },
      SOL: {
        name: 'Solana',
        nameCn: '索拉纳',
        symbol: 'SOL',
        category: 'crypto',
        color: '#00ffa3',
        binanceSymbol: 'SOLUSDT',
        yahooSymbol: 'SOL-USD',
        decimals: 2
      },
      TSLA: {
        name: 'Tesla',
        nameCn: '特斯拉',
        symbol: 'TSLA',
        category: 'stock',
        color: '#e82127',
        yahooSymbol: 'TSLA',
        decimals: 2
      },
      SPXC: {
        name: 'SpaceX',
        nameCn: '太空探索技术',
        symbol: 'SPCX',
        category: 'stock',
        color: '#1e3a5f',
        yahooSymbol: 'SPCX',
        decimals: 2
      },
      MU: {
        name: 'Micron',
        nameCn: '美光科技',
        symbol: 'MU',
        category: 'stock',
        color: '#ed1c24',
        yahooSymbol: 'MU',
        decimals: 2
      }
    };

    // State
    let chart = null;
    let currentPrice = 0;
    let priceHistory = [];
    let autoRefreshEnabled = true;
    let refreshInterval = null;
    let chartDataCache = {};
    let lastFetchTime = 0;
    let wsConnection = null;
    let reconnectAttempts = 0;
    let currentAsset = 'ETH';
    let currentApi = 'binance';

    // Generate asset selector buttons
    function generateAssetSelector() {
      const container = document.getElementById('assetSelector');
      container.innerHTML = '';
      
      Object.entries(ASSETS).forEach(([key, asset]) => {
        const btn = document.createElement('button');
        btn.className = 'asset-btn' + (key === currentAsset ? ' active' : '');
        btn.dataset.asset = key;
        btn.innerHTML = `
          <span class="asset-icon">${key.substring(0, 2)}</span>
          <span>${key}</span>
        `;
        btn.addEventListener('click', () => selectAsset(key));
        container.appendChild(btn);
      });
    }

    // Select asset
    async function selectAsset(assetKey) {
      if (assetKey === currentAsset) return;
      
      currentAsset = assetKey;
      
      // Update UI
      document.querySelectorAll('.asset-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.asset === assetKey);
      });
      
      const asset = ASSETS[assetKey];
      document.getElementById('assetName').textContent = `${asset.name} ${asset.nameCn}`;
      document.getElementById('assetCategory').textContent = asset.category === 'crypto' ? '加密货币' : '美股';
      document.getElementById('assetCategory').className = 'category-label ' + asset.category;
      
      const iconEl = document.getElementById('assetIconLarge');
      iconEl.textContent = asset.symbol.substring(0, 2);
      iconEl.style.background = `linear-gradient(135deg, ${asset.color}, ${asset.color}88)`;
      
      // Clear chart cache
      chartDataCache = {};
      lastFetchTime = 0;
      
      // Reset price display
      document.getElementById('currentPrice').textContent = '加载中...';
      priceHistory = [];
      
      // Reconnect WebSocket and fetch data
      if (wsConnection) {
        try { wsConnection.close(); } catch (e) {}
      }
      connectWebSocket();
      await fetchPriceData();
      
      const activeTimeframe = document.querySelector('.timeframe-btn.active');
      if (activeTimeframe) {
        await updateChart(parseInt(activeTimeframe.dataset.days));
      }
    }

    // Format number with commas
    function formatNumber(num, decimals = 2) {
      if (num === null || num === undefined || isNaN(num)) return '--';
      return num.toLocaleString('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    // Format time
    function formatTime(date) {
      return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    let lastStatusText = '';
    let lastConnectedState = null;

    // Update status bar
    function updateStatus(message, connected = false) {
      if (message === lastStatusText && connected === lastConnectedState) return;
      
      lastStatusText = message;
      lastConnectedState = connected;
      
      const statusBar = document.getElementById('statusBar');
      const displayMessage = message.replace('状态: ', '');
      statusBar.innerHTML = `<span class="status-dot"></span>${displayMessage}`;
      statusBar.className = 'status-bar' + (connected ? ' connected' : '');
    }

    // Update price display
    function updatePriceDisplay(data) {
      const price = data.price;
      if (!price || price <= 0) return;

      currentPrice = price;
      const asset = ASSETS[currentAsset];
      
      document.getElementById('currentPrice').textContent = '$' + formatNumber(price, asset.decimals);
      
      const change = data.change24h || 0;
      const changeAmount = price * (Math.abs(change) / 100);
      const isPositive = change >= 0;
      
      const priceChangeEl = document.getElementById('priceChange');
      priceChangeEl.className = 'price-change ' + (isPositive ? 'positive' : 'negative');
      priceChangeEl.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="${isPositive ? 'M18 15l-6-6-6 6' : 'M6 9l6 6 6-6'}"/>
        </svg>
        <span id="changePercent">${isPositive ? '+' : ''}${change.toFixed(2)}%</span>
        <span id="changeAmount">(${isPositive ? '+' : '-'}$${formatNumber(changeAmount)})</span>
      `;
      
      // Update stats
      const changeVal = data.change24h || 0;
      const changeStatEl = document.getElementById('change24hStat');
      changeStatEl.textContent = (changeVal >= 0 ? '+' : '') + changeVal.toFixed(2) + '%';
      changeStatEl.style.color = changeVal >= 0 ? 'var(--accent-emerald)' : 'var(--accent-rose)';
      document.getElementById('volume').textContent = data.volume || '--';
      document.getElementById('high24h').textContent = data.high24h ? '$' + formatNumber(data.high24h, asset.decimals) : '--';
      document.getElementById('low24h').textContent = data.low24h ? '$' + formatNumber(data.low24h, asset.decimals) : '--';
      document.getElementById('lastUpdate').textContent = formatTime(new Date());
      
      // Update predictions and levels
      updatePredictions(price);
      calculateLevels(price);
      
      // Add to price history
      priceHistory.push({ time: Date.now(), price: price });
      if (priceHistory.length > 100) priceHistory.shift();
      
      // Update chart with new price
      if (chart && priceHistory.length > 0) {
        updateChartLive(price);
      }
    }
    
    // Update chart in real-time
    function updateChartLive(newPrice) {
      if (!chart) return;
      
      const now = new Date();
      const label = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      
      chart.data.labels.push(label);
      chart.data.datasets[0].data.push(newPrice);
      
      if (chart.data.labels.length > 60) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
      }
      
      const isUp = newPrice >= currentPrice;
      const color = isUp ? '0, 240, 255' : '244, 63, 94';
      chart.data.datasets[0].borderColor = `rgb(${color})`;
      chart.data.datasets[0].pointHoverBackgroundColor = `rgb(${color})`;
      
      chart.update('none');
    }

    // API configurations
    const API_CONFIG = {
      binance: {
        name: 'Binance',
        getTickerUrl: (asset) => `https://data-api.binance.vision/api/v3/ticker/24hr?symbol=${ASSETS[asset].binanceSymbol}`,
        getKlineUrl: (asset, interval, limit) => `https://data-api.binance.vision/api/v3/klines?symbol=${ASSETS[asset].binanceSymbol}&interval=${interval}&limit=${limit}`,
        getWsUrl: (asset) => `wss://stream.binance.com:9443/ws/${ASSETS[asset].binanceSymbol.toLowerCase()}@ticker`,
        parseTicker: (data, asset) => ({
          price: parseFloat(data.lastPrice),
          change24h: parseFloat(data.priceChangePercent),
          volume: parseFloat(data.quoteVolume) > 1e9 
            ? (parseFloat(data.quoteVolume) / 1e9).toFixed(2) + 'B' 
            : (parseFloat(data.quoteVolume) / 1e6).toFixed(2) + 'M',
          high24h: parseFloat(data.highPrice),
          low24h: parseFloat(data.lowPrice)
        }),
        parseKline: (data) => ({
          time: data[0],
          price: parseFloat(data[4])
        }),
        interval: { 1: '1h', 7: '1h', 30: '4h', 90: '1d' },
        limit: { 1: 24, 7: 168, 30: 180, 90: 90 },
        isCryptoOnly: true
      },
      bitfinex: {
        name: 'Bitfinex',
        getTickerUrl: (asset) => {
          const symbol = ASSETS[asset].binanceSymbol.replace('USDT', 'USD').replace('BTC', 'BTC');
          return `https://api-pub.bitfinex.com/v2/ticker/t${symbol}`;
        },
        getKlineUrl: (asset, interval, limit) => {
          const symbol = ASSETS[asset].binanceSymbol.replace('USDT', 'USD');
          return `https://api-pub.bitfinex.com/v2/candles/trade:${interval}:t${symbol}/hist?limit=${limit}`;
        },
        wsUrl: null,
        parseTicker: (data) => {
          const lastPrice = parseFloat(data[4]);
          const dailyChangePerc = parseFloat(data[9]) * 100;
          return {
            price: lastPrice,
            change24h: dailyChangePerc,
            volume: '--',
            high24h: parseFloat(data[6]),
            low24h: parseFloat(data[7])
          };
        },
        parseKline: (data) => ({
          time: data[0],
          price: parseFloat(data[2])
        }),
        interval: { 1: '1h', 7: '1h', 30: '4h', 90: '1d' },
        limit: { 1: 24, 7: 168, 30: 180, 90: 90 },
        isCryptoOnly: true
      }
    };

    // Fetch price data
    async function fetchPriceData() {
      const asset = ASSETS[currentAsset];
      
      // For stocks, use Yahoo Finance
      if (asset.category === 'stock') {
        return fetchStockData();
      }
      
      const api = API_CONFIG[currentApi];
      
      try {
        updateStatus(`状态: 获取数据 (${api.name})...`, false);
        
        const response = await fetch(api.getTickerUrl(currentAsset));

        if (!response.ok) {
          throw new Error(`${api.name} API failed: ${response.status}`);
        }

        const data = await response.json();
        const ticker = api.parseTicker(data, currentAsset);

        updatePriceDisplay(ticker);
        updateStatus(`状态: 已连接 (${api.name})`, true);

      } catch (error) {
        console.error('Fetch error:', error);
        updateStatus(`状态: ${api.name} 连接失败`, false);
        
        tryNextApi();
      }
    }

    // Fetch stock data from Sina Finance (China accessible)
    async function fetchStockData() {
      const asset = ASSETS[currentAsset];
      
      try {
        updateStatus('状态: 获取美股数据...', false);
        
        // Sina Finance API - accessible in China
        // Format: gb_ + symbol lowercase for US stocks
        const symbol = 'gb_' + asset.yahooSymbol.toLowerCase();
        const url = `https://hq.sinajs.cn/list=${symbol}`;
        
        const response = await fetch(url, {
          headers: {
            'Referer': 'https://finance.sina.com.cn/'
          }
        });
        
        if (!response.ok) {
          throw new Error(`Sina Finance API failed: ${response.status}`);
        }

        const text = await response.text();
        
        // Parse Sina Finance response: var hq_str_gb_tsla="TSLA,price,change,changePercent,..."
        const match = text.match(/"([^"]+)"/);
        if (!match || !match[1]) {
          throw new Error('Invalid response format');
        }
        
        const data = match[1].split(',');
        if (data.length < 4) {
          throw new Error('Insufficient data');
        }
        
        // Sina Finance US stock format:
        // name, current price, yesterday close, change, change %, ...
        const currentPriceVal = parseFloat(data[1]) || 0;
        const yesterdayClose = parseFloat(data[2]) || currentPriceVal;
        const change = currentPriceVal - yesterdayClose;
        const change24h = yesterdayClose > 0 ? (change / yesterdayClose) * 100 : 0;
        
        // Get additional data
        const high = parseFloat(data[4]) || currentPriceVal;
        const low = parseFloat(data[5]) || currentPriceVal;
        const volume = parseFloat(data[6]) || 0;
        const volumeFormatted = volume > 1e9 
          ? (volume / 1e9).toFixed(2) + 'B' 
          : volume > 1e6 
            ? (volume / 1e6).toFixed(2) + 'M'
            : volume.toFixed(2);
        
        updatePriceDisplay({
          price: currentPriceVal,
          change24h: change24h,
          volume: volumeFormatted,
          high24h: high,
          low24h: low
        });
        
        // Fetch historical data for chart using Sina
        await fetchStockHistory();
        
        updateStatus('状态: 已连接 (新浪财经)', true);

      } catch (error) {
        console.error('Stock fetch error:', error);
        updateStatus('状态: 美股数据获取失败', false);
      }
    }
    
    // Fetch stock historical data from Sina Finance
    async function fetchStockHistory() {
      const asset = ASSETS[currentAsset];
      
      try {
        // Sina Finance historical data API
        const symbol = 'gb_' + asset.yahooSymbol.toLowerCase();
        
        // Use a different endpoint for historical data
        const url = `https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=${symbol}&scale=240&ma=5&datalen=90`;
        
        const response = await fetch(url, {
          headers: {
            'Referer': 'https://finance.sina.com.cn/'
          }
        });
        
        if (!response.ok) {
          throw new Error('Historical data fetch failed');
        }
        
        const data = await response.json();
        
        if (!Array.isArray(data) || data.length === 0) {
          // Fallback: generate sample data based on current price
          const currentPrice = currentPrice;
          const chartPoints = [];
          for (let i = 89; i >= 0; i--) {
            const date = new Date();
            date.setDate(date.getDate() - i);
            // Simulate slight variations
            const variation = (Math.random() - 0.5) * 0.02 * currentPrice;
            chartPoints.push({
              time: date.getTime(),
              price: currentPrice + variation * (i / 10)
            });
          }
          chartDataCache['chart_stock'] = chartPoints;
          return;
        }
        
        const chartPoints = data.map(d => ({
          time: new Date(d.day).getTime(),
          price: parseFloat(d.close)
        })).filter(p => !isNaN(p.price));
        
        chartDataCache['chart_stock'] = chartPoints;
        lastFetchTime = Date.now();
        
      } catch (error) {
        console.error('Historical fetch error:', error);
        // Generate fallback data
        const currentPrice = currentPrice;
        const chartPoints = [];
        for (let i = 89; i >= 0; i--) {
          const date = new Date();
          date.setDate(date.getDate() - i);
          const variation = (Math.random() - 0.5) * 0.02 * currentPrice;
          chartPoints.push({
            time: date.getTime(),
            price: currentPrice + variation * (i / 10)
          });
        }
        chartDataCache['chart_stock'] = chartPoints;
      }
    }

    // Try next available API
    async function tryNextApi() {
      const apis = Object.keys(API_CONFIG);
      const currentIndex = apis.indexOf(currentApi);
      const nextIndex = (currentIndex + 1) % apis.length;
      
      if (nextIndex !== currentIndex) {
        currentApi = apis[nextIndex];
        document.getElementById('apiSelector').value = currentApi;
        await fetchPriceData();
      } else {
        setTimeout(fetchPriceData, 3000);
      }
    }

    // Fetch historical klines for chart
    async function fetchKlineData(days = 7) {
      const asset = ASSETS[currentAsset];
      
      // For stocks, return cached data
      if (asset.category === 'stock') {
        const cacheKey = 'chart_stock';
        const now = Date.now();
        
        if (chartDataCache[cacheKey] && (now - lastFetchTime) < 30000) {
          return filterChartData(chartDataCache[cacheKey], days);
        }
        
        // Refetch if cache is stale
        await fetchStockData();
        return filterChartData(chartDataCache[cacheKey] || [], days);
      }
      
      const api = API_CONFIG[currentApi];
      const cacheKey = `chart_${currentApi}_${currentAsset}_${days}`;
      const now = Date.now();

      if (chartDataCache[cacheKey] && (now - lastFetchTime) < 30000) {
        return chartDataCache[cacheKey];
      }

      try {
        const interval = api.interval[days] || '1H';
        const limit = api.limit[days] || 100;
        
        const response = await fetch(api.getKlineUrl(currentAsset, interval, limit));

        if (!response.ok) {
          throw new Error('Kline API request failed');
        }

        const result = await response.json();
        
        let klineArray;
        if (currentApi === 'binance') {
          klineArray = Array.isArray(result) ? result : result.data;
        } else {
          klineArray = result.data || [];
        }
        
        if (!Array.isArray(klineArray)) {
          throw new Error('Invalid kline response format');
        }

        const chartData = klineArray.map(api.parseKline);

        chartDataCache[cacheKey] = chartData;
        lastFetchTime = now;

        return chartData;

      } catch (error) {
        console.error('Kline error:', error);
        return null;
      }
    }

    // Filter chart data by days
    function filterChartData(data, days) {
      if (!data || data.length === 0) return [];
      
      const now = Date.now();
      const cutoff = now - (days * 24 * 60 * 60 * 1000);
      
      return data.filter(d => d.time >= cutoff);
    }

    // Connect to WebSocket
    function connectWebSocket() {
      const asset = ASSETS[currentAsset];
      
      // Stocks don't support WebSocket in this demo
      if (asset.category === 'stock') {
        updateStatus('状态: 已连接 (Yahoo Finance)', true);
        return;
      }
      
      const api = API_CONFIG[currentApi];
      
      if (wsConnection) {
        try { wsConnection.close(); } catch (e) {}
      }

      if (!api.getWsUrl) {
        updateStatus(`状态: 已连接 (${api.name} - REST)`, true);
        return;
      }

      updateStatus(`状态: 连接 ${api.name}...`, false);

      try {
        const ws = new WebSocket(api.getWsUrl(currentAsset));

        ws.onopen = () => {
          console.log('WebSocket connected');
          updateStatus(`状态: 已连接 (${api.name})`, true);
          reconnectAttempts = 0;
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            
            if (msg.e === '24hrTicker') {
              const lastPrice = parseFloat(msg.c);
              const change24h = parseFloat(msg.priceChangePercent);

              updatePriceDisplay({
                price: lastPrice,
                change24h: change24h,
                volume: parseFloat(msg.q) > 1e9 ? (parseFloat(msg.q) / 1e9).toFixed(2) + 'B' : (parseFloat(msg.q) / 1e6).toFixed(2) + 'M',
                high24h: parseFloat(msg.h),
                low24h: parseFloat(msg.l)
              });
            }
          } catch (e) {
            // Ignore parse errors
          }
        };

        ws.onerror = (error) => {
          console.error('WebSocket error:', error);
          updateStatus('状态: WebSocket 错误', false);
        };

        ws.onclose = () => {
          console.log('WebSocket disconnected');
          updateStatus('状态: 重新连接中...', false);
          
          reconnectAttempts++;
          const delay = Math.min(3000 * reconnectAttempts, 15000);
          
          if (autoRefreshEnabled) {
            setTimeout(connectWebSocket, delay);
          }
        };

        wsConnection = ws;
      } catch (error) {
        console.error('WebSocket connection error:', error);
        updateStatus('状态: WebSocket 不可用', false);
      }
    }

    // Market sentiment data
    let marketSentiment = {
      fearGreedIndex: 50,
      trendStrength: 0,
      volatilityIndex: 0.02,
      trendDirection: 'neutral'
    };

    // Technical indicators
    let technicalIndicators = {
      sma20: 0,
      sma50: 0,
      rsi: 50,
      momentum: 0,
      macdSignal: 0
    };

    function calculateSMA(prices, period) {
      if (prices.length < period) return prices.length > 0 ? prices[prices.length - 1] : 0;
      const slice = prices.slice(-period);
      return slice.reduce((a, b) => a + b, 0) / slice.length;
    }

    function calculateRSI(prices, period = 14) {
      if (prices.length < period + 1) return 50;
      
      let gains = 0, losses = 0;
      for (let i = prices.length - period; i < prices.length; i++) {
        const change = prices[i] - prices[i - 1];
        if (change > 0) gains += change;
        else losses += Math.abs(change);
      }
      
      const avgGain = gains / period;
      const avgLoss = losses / period;
      
      if (avgLoss === 0) return 100;
      const rs = avgGain / avgLoss;
      return 100 - (100 / (1 + rs));
    }

    function calculateEMA(prices, period) {
      if (prices.length < period) return prices.length > 0 ? prices[prices.length - 1] : 0;
      
      const multiplier = 2 / (period + 1);
      let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
      
      for (let i = period; i < prices.length; i++) {
        ema = (prices[i] - ema) * multiplier + ema;
      }
      return ema;
    }

    function detectTrend(prices) {
      if (prices.length < 20) return 'neutral';
      
      const recent = prices.slice(-20);
      const sma20 = calculateSMA(recent, 20);
      const sma5 = calculateSMA(recent, 5);
      
      const slope = (sma5 - sma20) / sma20;
      
      if (slope > 0.005) return 'bullish';
      if (slope < -0.005) return 'bearish';
      return 'neutral';
    }

    function calculateMomentum(prices, period) {
      if (prices.length < period + 1) return 0;
      const current = prices[prices.length - 1];
      const past = prices[prices.length - period - 1];
      return (current - past) / past;
    }

    function updatePredictions(price) {
      if (!price || price <= 0) return;

      const prices = priceHistory.map(p => p.price);
      if (prices.length > 0) {
        prices.push(price);
      }

      const indicators = {};
      indicators.sma20 = calculateSMA(prices, 20);
      indicators.rsi = calculateRSI(prices, 14);
      indicators.momentum = calculateMomentum(prices, 10);
      indicators.volatility = technicalIndicators.volatility || 0.02;
      technicalIndicators = indicators;

      const trendMultiplier = marketSentiment.trendDirection === 'bullish' ? 1.2 : 
                              marketSentiment.trendDirection === 'bearish' ? 0.8 : 1.0;
      
      const rsiBias = (indicators.rsi - 50) / 500;
      const momentum = indicators.momentum || 0;
      const baseVolatility = indicators.volatility || 0.02;

      const hourlyVolatility = baseVolatility * Math.sqrt(1 / 24);
      const hourlyDrift = (rsiBias + momentum * 0.5) * 0.3;
      const pred1h = price * (1 + hourlyDrift + (Math.random() - 0.5) * hourlyVolatility * trendMultiplier);
      
      const dailyVolatility = baseVolatility * Math.sqrt(1);
      const dailyDrift = (rsiBias + momentum * 2) * trendMultiplier;
      const pred24h = price * (1 + dailyDrift + (Math.random() - 0.5) * dailyVolatility);

      const weeklyVolatility = baseVolatility * Math.sqrt(7);
      const weeklyDrift = (rsiBias + momentum * 5) * trendMultiplier;
      const pred7d = price * (1 + weeklyDrift + (Math.random() - 0.5) * weeklyVolatility);

      const asset = ASSETS[currentAsset];
      
      const priceDataPoints = Math.min(prices.length, 100) / 100;
      const trendStrength = marketSentiment.trendStrength / 100;
      const rsiConfidence = indicators.rsi > 30 && indicators.rsi < 70 ? 0.8 : 0.5;
      const baseConfidence = 70;

      const conf1h = Math.max(50, Math.min(92, baseConfidence + trendStrength * 15 + priceDataPoints * 10 - baseVolatility * 200));
      const conf24h = Math.max(45, Math.min(85, baseConfidence * 0.9 + trendStrength * 12 + priceDataPoints * 8 - baseVolatility * 300 + rsiConfidence * 5));
      const conf7d = Math.max(35, Math.min(75, baseConfidence * 0.75 + trendStrength * 8 + priceDataPoints * 5 - baseVolatility * 400 + rsiConfidence * 3));

      document.getElementById('pred1h').textContent = '$' + formatNumber(pred1h, asset.decimals);
      updatePredictionChange('pred1hChange', pred1h, price);
      document.getElementById('conf1h').textContent = Math.round(conf1h) + '%';
      document.getElementById('confBar1h').style.width = conf1h + '%';
      
      document.getElementById('pred24h').textContent = '$' + formatNumber(pred24h, asset.decimals);
      updatePredictionChange('pred24hChange', pred24h, price);
      document.getElementById('conf24h').textContent = Math.round(conf24h) + '%';
      document.getElementById('confBar24h').style.width = conf24h + '%';
      
      document.getElementById('pred7d').textContent = '$' + formatNumber(pred7d, asset.decimals);
      updatePredictionChange('pred7dChange', pred7d, price);
      document.getElementById('conf7d').textContent = Math.round(conf7d) + '%';
      document.getElementById('confBar7d').style.width = conf7d + '%';

      updateTrendIndicator();
    }

    function updateTrendIndicator() {
      const trendEl = document.getElementById('trendIndicator');
      if (!trendEl) return;
      
      const trend = detectTrend(priceHistory.map(p => p.price));
      marketSentiment.trendDirection = trend;
      
      let trendText, trendClass;
      if (trend === 'bullish') {
        trendText = '上涨趋势';
        trendClass = 'positive';
      } else if (trend === 'bearish') {
        trendText = '下跌趋势';
        trendClass = 'negative';
      } else {
        trendText = '横盘整理';
        trendClass = 'neutral';
      }
      
      trendEl.className = `trend-indicator ${trendClass}`;
      trendEl.innerHTML = `<span class="trend-text">${trendText}</span><span class="trend-strength">强度 ${Math.round(marketSentiment.trendStrength)}%</span>`;
    }

    function updatePredictionChange(elementId, predicted, current) {
      if (!predicted || !current || current <= 0) return;
      
      const change = ((predicted - current) / current) * 100;
      const element = document.getElementById(elementId);
      const isPositive = change >= 0;
      
      element.className = 'prediction-change ' + (isPositive ? 'positive' : 'negative');
      element.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="${isPositive ? 'M18 15l-6-6-6 6' : 'M6 9l6 6 6-6'}"/>
        </svg>
        <span>${isPositive ? '+' : ''}${change.toFixed(2)}%</span>
      `;
    }

    function calculateLevels(price) {
      if (!price || price <= 0) return;

      const asset = ASSETS[currentAsset];
      const volatility = technicalIndicators.volatility || 0.02;
      const atr = price * volatility;

      const support = price - atr * 1;
      const resistance = price + atr * 1;
      
      document.getElementById('supportLevel').textContent = '$' + formatNumber(support, asset.decimals);
      document.getElementById('supportDistance').textContent = 
        ((price - support) / price * 100).toFixed(1) + '% 低于现价';
      
      document.getElementById('resistanceLevel').textContent = '$' + formatNumber(resistance, asset.decimals);
      document.getElementById('resistanceDistance').textContent = 
        ((resistance - price) / price * 100).toFixed(1) + '% 高于现价';
    }

    // Update chart
    async function updateChart(days = 7) {
      const chartData = await fetchKlineData(days);
      
      if (!chartData || chartData.length === 0) {
        console.log('No chart data available');
        return;
      }
      
      const asset = ASSETS[currentAsset];
      
      const labels = chartData.map(d => {
        const date = new Date(d.time);
        if (days === 1) {
          return date.getHours() + ':00';
        } else if (days <= 7) {
          return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit' });
        } else {
          return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }
      });
      
      const prices = chartData.map(d => d.price);
      const isUp = prices[prices.length - 1] >= prices[0];
      const gradientColor = isUp ? '0, 240, 255' : '244, 63, 94';
      const borderColor = isUp ? '0, 240, 255' : '244, 63, 94';
      
      if (chart) {
        chart.destroy();
      }
      
      const ctx = document.getElementById('priceChart').getContext('2d');
      
      const gradient = ctx.createLinearGradient(0, 0, 0, 400);
      gradient.addColorStop(0, `rgba(${gradientColor}, 0.3)`);
      gradient.addColorStop(1, `rgba(${gradientColor}, 0)`);
      
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: asset.symbol + ' Price',
            data: prices,
            borderColor: `rgb(${borderColor})`,
            backgroundColor: gradient,
            borderWidth: 2,
            fill: true,
            tension: 0.4,
            pointRadius: 0,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: `rgb(${borderColor})`,
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: 'rgba(10, 10, 26, 0.9)',
              titleColor: '#94a3b8',
              bodyColor: '#ffffff',
              bodyFont: {
                family: "'SF Mono', 'Menlo', 'Monaco', monospace",
                size: 14,
                weight: 600
              },
              padding: 12,
              borderColor: 'rgba(0, 240, 255, 0.3)',
              borderWidth: 1,
              displayColors: false,
              callbacks: {
                label: function(context) {
                  return '$' + formatNumber(context.parsed.y, asset.decimals);
                }
              }
            }
          },
          scales: {
            x: {
              grid: {
                color: 'rgba(255, 255, 255, 0.05)',
                drawBorder: false
              },
              ticks: {
                color: '#64748b',
                font: {
                  size: 11
                },
                maxTicksLimit: 8
              }
            },
            y: {
              position: 'right',
              grid: {
                color: 'rgba(255, 255, 255, 0.05)',
                drawBorder: false
              },
              ticks: {
                color: '#64748b',
                font: {
                  family: "'SF Mono', 'Menlo', 'Monaco', monospace",
                  size: 11
                },
                callback: function(value) {
                  return '$' + formatNumber(value, 0);
                }
              }
            }
          },
          animation: {
            duration: 1000,
            easing: 'easeOutQuart'
          }
        }
      });
    }

    // Timeframe selector
    document.querySelectorAll('.timeframe-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        updateChart(parseInt(this.dataset.days));
      });
    });

    // Auto refresh toggle
    document.getElementById('autoRefresh').addEventListener('click', function() {
      autoRefreshEnabled = !autoRefreshEnabled;
      this.classList.toggle('active', autoRefreshEnabled);
      
      if (autoRefreshEnabled) {
        startAutoRefresh();
        connectWebSocket();
      } else {
        stopAutoRefresh();
        if (wsConnection) {
          wsConnection.close();
          updateStatus('状态: 已暂停', false);
        }
      }
    });

    function startAutoRefresh() {
      if (refreshInterval) clearInterval(refreshInterval);
      
      refreshInterval = setInterval(() => {
        fetchPriceData();
      }, 3000); // 3 seconds for better performance with multiple assets
    }

    function stopAutoRefresh() {
      if (refreshInterval) {
        clearInterval(refreshInterval);
        refreshInterval = null;
      }
    }

    // API selector event listener
    document.getElementById('apiSelector').addEventListener('change', async function() {
      currentApi = this.value;
      
      chartDataCache = {};
      lastFetchTime = 0;
      
      if (wsConnection) {
        try { wsConnection.close(); } catch (e) {}
      }
      connectWebSocket();
      
      await fetchPriceData();
      
      const activeTimeframe = document.querySelector('.timeframe-btn.active');
      if (activeTimeframe) {
        await updateChart(parseInt(activeTimeframe.dataset.days));
      }
    });

    // Initialize
    async function init() {
      updateStatus('状态: 初始化中...', false);
      
      // Generate asset selector
      generateAssetSelector();
      
      // Initialize asset display
      selectAsset('ETH');
      
      // Load chart
      await updateChart(7);
      
      // Start polling
      if (autoRefreshEnabled) {
        startAutoRefresh();
      }
      
      // Try WebSocket
      connectWebSocket();
    }

    // Start when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
